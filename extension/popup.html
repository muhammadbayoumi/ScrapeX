<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<style>
  :root{
    --bg:#fff;--line:#e4e7eb;--text:#1a1d21;--muted:#6b7280;--accent:#1d9e75;
    --accent-weak:#e1f5ee;--amber:#b7791f;--amber-weak:#fdf6e3;--red:#c0392b;--chip:#eef1f4;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#171b21;--line:#2a2f37;--text:#e6e9ee;--muted:#9aa4b2;--accent:#3fcaa0;
    --accent-weak:#0f2b23;--amber:#e0b25a;--amber-weak:#2a2312;--red:#e07a6f;--chip:#222831;}}
  *{box-sizing:border-box}
  body{width:340px;margin:0;background:var(--bg);color:var(--text);
    font-family:"Segoe UI",system-ui,"Noto Sans Arabic",sans-serif;font-size:13px}
  header{display:flex;align-items:center;justify-content:space-between;
    padding:.7rem .9rem;border-bottom:1px solid var(--line)}
  .brand{font-weight:600;color:var(--accent)}.brand::before{content:"◆ "}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);display:inline-block;margin-inline-start:.4rem}
  .dot.on{background:var(--accent)}.dot.off{background:var(--red)}
  main{padding:.8rem .9rem;display:flex;flex-direction:column;gap:.7rem}
  .muted{color:var(--muted)}
  .card{border:1px solid var(--line);border-radius:10px;padding:.7rem .8rem}
  .card.hi{border-color:var(--accent)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
  button{font:inherit;padding:.4rem .8rem;border:1px solid var(--accent);background:var(--accent);
    color:#fff;border-radius:8px;cursor:pointer;white-space:nowrap}
  button.ghost{background:transparent;color:var(--accent)}
  button:disabled{opacity:.5;cursor:default}
  .list{display:flex;flex-direction:column;gap:.35rem;max-height:220px;overflow:auto}
  .srow{display:flex;align-items:center;justify-content:space-between;gap:.4rem;
    padding:.35rem .5rem;border:1px solid var(--line);border-radius:8px}
  .srow .n{font-variant-numeric:tabular-nums;color:var(--muted);font-size:.85em}
  .chip{background:var(--chip);border-radius:999px;padding:.05rem .5rem;font-size:.72em;color:var(--muted);direction:ltr}
  .chip.off{background:var(--amber-weak);color:var(--amber)}
  input{font:inherit;padding:.35rem .5rem;border:1px solid var(--line);border-radius:8px;
    background:var(--bg);color:var(--text);width:100%;direction:ltr}
  .settings{border-top:1px solid var(--line);padding-top:.6rem}
  .link{color:var(--accent);cursor:pointer;font-size:.85em}
  #result{font-size:.9em}
  .ok{color:var(--accent)}.err{color:var(--red)}
</style>
</head>
<body>
  <header>
    <span class="brand">ScrapeX</span>
    <span class="muted" style="font-size:.82em">الخادم <span id="dot" class="dot"></span> <span id="status">…</span></span>
  </header>
  <main>
    <div id="current" class="card hi" hidden></div>

    <div>
      <div class="row" style="margin-bottom:.4rem">
        <b>المصادر</b>
        <button id="browse" class="ghost">تصفّح المستودع ↗</button>
      </div>
      <div id="list" class="list"><div class="muted">جارِ التحميل…</div></div>
    </div>

    <div id="result"></div>

    <div class="settings">
      <span class="link" id="toggle-settings">إعدادات الخادم</span>
      <div id="settings-body" hidden style="margin-top:.5rem">
        <input id="backend" placeholder="http://127.0.0.1:8000">
        <div class="row" style="margin-top:.4rem">
          <span class="muted" style="font-size:.8em">عنوان خادم scrapex المحلي</span>
          <button id="save" class="ghost">حفظ</button>
        </div>
      </div>
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
