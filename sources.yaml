  # ---- probed: data publisher; LATEST PRICE ONLY (owner license decision) ----
  - source_key: GPP_ENERGY
    source_name: أسعار الطاقة العالمية
    base_url: https://www.globalpetrolprices.com
    family: static-html-table
    cadence: weekly
    authority: aggregator
    active: true
    # FALLBACK currency only — it now covers just the electricity rank-table
    # rows, which are the site's own USD conversions, honestly marked
    # price_basis=converted. Fuel rows carry the currency each country page
    # publishes (EGP, SAR, EUR...), read off the page, never from here.
    # Warehouse wiped + set for recrawl 2026-07-21 when this changed; the
    # pre-wipe backup sits beside marketlens.db.
    currency: USD
    # Tax evidence, found by READING each energy type's own live page — first
    # 2026-07-20, re-verified per page 2026-07-22 — never assumed. One rule per
    # ENERGY TYPE, because that is how the site states it: with a single
    # region-wide rule every gasoline and electricity row wore the diesel
    # page's link, which the owner rightly reported as wrong. No page anywhere
    # names a rate for any country, so rate_pct stays empty throughout:
    # inventing 169 rates is the assertion this field exists to prevent.
    # NATURAL_GAS deliberately has NO entry — its page makes no tax statement,
    # and its rows must resolve to Unverified rather than borrow diesel's link.
    tax:
      - region: "*"
        material: DIESEL
        vat_mode: incl
        evidence: general
        statement_text: >-
          The differences in prices across countries are due to the various taxes
          and subsidies for diesel. All countries have access to the same petroleum
          prices of international markets but then decide to impose different taxes.
          As a result, the retail price of diesel is different.
        statement_url: https://www.globalpetrolprices.com/diesel_prices/
        statement_lang: en
        verified_at: "2026-07-20"
      - region: "*"
        material: GASOLINE
        vat_mode: incl
        evidence: general
        statement_text: >-
          The differences in prices across countries are due to the various taxes
          and subsidies for gasoline. All countries have access to the same
          petroleum prices of international markets but then decide to impose
          different taxes.
        statement_url: https://www.globalpetrolprices.com/gasoline_prices/
        statement_lang: en
        verified_at: "2026-07-22"
      - region: "*"
        material: LPG
        vat_mode: incl
        evidence: general
        statement_text: >-
          The differences in prices across countries are due to the various taxes
          and subsidies for LPG. All countries have access to the same natural gas
          prices of international markets but then decide to impose different
          taxes.
        statement_url: https://www.globalpetrolprices.com/lpg_prices/
        statement_lang: en
        verified_at: "2026-07-22"
      - region: "*"
        material: ELECTRICITY
        vat_mode: incl
        evidence: general
        statement_text: >-
          Final retail prices with all taxes and fees included.
        statement_url: https://www.globalpetrolprices.com/electricity_prices/
        statement_lang: en
        verified_at: "2026-07-22"
      - region: "*"
        material: ELECTRICITY_BUSINESS
        vat_mode: incl
        evidence: general
        statement_text: >-
          Final retail prices with all taxes and fees included.
        statement_url: https://www.globalpetrolprices.com/electricity_prices/
        statement_lang: en
        verified_at: "2026-07-22"
    extract:
      - kind: commodity_price
        scope: latest_only     # owner decision: latest published price only,
                               # never the paid historical series (tested, T6)
        # ELECTRICITY_BUSINESS is the same page's second column: the site
        # publishes materially different residential and business rates
        # (Germany 0.406 vs 0.283). The connector has always defined it and the
        # manifest never contracted it, so ~125 rows were collected by nobody.
        # No extra request: one page serves both.
        materials: [DIESEL, GASOLINE, LPG, ELECTRICITY, ELECTRICITY_BUSINESS, NATURAL_GAS]
        regions: ["*"]
    min_expected_rows: 150     # ~180 countries per fuel page; a big drop = layout change
    max_drop_pct: 20
    notes: >
      5 weekly list pages cover ~180 countries x 5 energy types. Positional
      parsing MUST assert len(labels)==len(values) (Q4). History accumulates
      from OUR weekly observations, never from their paid feed.

